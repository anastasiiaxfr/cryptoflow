{{ define "main" }}
{{ $lang := .Page.Lang }}
{{ $data := index $.Site.Data }}


<div>
  <!-- BEGIN section -->
  {{- partial "header.html" . -}}
  <!-- END section -->
</div>
<article class="page__single">
  <div class="hero__single">
    <div class="container">
      <h1>{{ .Title }}</h1>
    </div>
  </div>

  <div class="container news__wrap">
    {{ range .Pages }}
    {{ partial "_news-item.html" . }}
    {{ end }}
  </div>

</article>



{{ end }}
