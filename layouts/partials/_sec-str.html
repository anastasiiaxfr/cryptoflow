{{ $data := index .Site.Data .Site.Language.Lang }}

{{ if $data.homepage.section_str }}
{{ with $data.homepage.section_str }}

<section class="section section_str">
    <div class="container">
        <div class="steps">
            <div class="steps__title">
                <h2>{{ .title }}</h2>
                <div class="badge">
                    <svg class="icon" width="24" height="24">
                        <use xlink:href="#arr-tr"></use>
                    </svg>
                </div>

            </div>
            <div class="steps__items">
                {{ range .steps }}
                    <div class="step">
                        <div class="step__header">
                            <span>STEP</span>&nbsp;<span>{{ .num }}</span>
                        </div>
                        <div class="step__content">
                            <div class="step__title">
                                {{ .title }}
                            </div>
                            <svg class="icon" height="24">
                                <use xlink:href="#arrow"></use>
                              </svg>
                            <div>
                                {{ .desc }}
                            </div>
                        </div>
                    </div>
                {{ end }}
            </div>
        </div>
    </div>
</section>

{{ end }}
{{ end }}
